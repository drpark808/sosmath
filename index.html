<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mary, Star of the Sea — Math Tutorials</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eef2fa 0%, #f8f9fa 100%);
      color: #253a77;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      text-align: center;
    }
    .logo-wrap {
      margin-bottom: 30px;
    }
    .logo-wrap img {
      max-width: 360px;
      width: 90%;
      height: auto;
    }
    h1 {
      color: #253a77;
      font-size: 2.2rem;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .subtitle {
      color: #555;
      font-size: 1.1rem;
      margin-bottom: 40px;
      font-style: italic;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #fff;
      border: 2px solid #253a77;
      border-radius: 12px;
      padding: 28px 20px;
      text-decoration: none;
      color: #253a77;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(37, 58, 119, 0.08);
      display: block;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 24px rgba(37, 58, 119, 0.2);
      background: #253a77;
      color: #fff;
    }
    .card-grade {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1;
    }
    .card-label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .card-theme {
      font-size: 0.85rem;
      opacity: 0.8;
      font-style: italic;
    }
    footer {
      margin-top: 50px;
      font-size: 0.85rem;
      color: #888;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .card-grade { font-size: 2.4rem; }
    }
  </style>
</head>
